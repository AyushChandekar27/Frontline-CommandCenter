# Server
server.port=8081
# PostgreSQL
spring.task.scheduling.pool.size=2
spring.jpa.open-in-view=false
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.default_schema=public
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Keep connections alive — prevent Neon cold starts
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=5
# App name
spring.application.name=frontline_commandcenter

# CORS is handled in code (see CorsConfig.java)




# JWT
app.jwt.secret=frontline-command-center-super-secret-key-minimum-32-chars
app.jwt.expiration-ms=86400000
